name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ml:
    name: ML (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    defaults:
      run:
        working-directory: earshot/ml
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project and test dependencies
        run: python -m pip install --upgrade pip ".[test,train]"
      - name: Run fast tests
        run: python -m pytest -m "not integration" -q

  runtime-without-training:
    name: Runtime without scikit-learn
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: earshot/ml
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime only
        run: python -m pip install --upgrade pip .
      - name: Verify runtime imports do not need scikit-learn
        run: python -c "import sys; sys.modules['sklearn'] = None; import earshot_ml, earshot_ml.cli; print('runtime imports without scikit-learn')"
      - name: Verify CLI help
        run: python -m earshot_ml.cli --help

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: earshot/backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend, ML runtime, and tests
        run: python -m pip install --upgrade pip pytest -r requirements.txt -e ../ml
      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: earshot/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: earshot/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build TypeScript
        run: npm run build
      - name: Install ML runtime for WAV round-trip test
        run: python -m pip install --upgrade pip -e ../ml
      - name: Run frontend tests
        run: node tests/test_frontend.mjs
        env:
          EARSHOT_TEST_PYTHON: python
