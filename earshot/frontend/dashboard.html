<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Earshot · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --silence: #ECEFF3;   /* page base: cool fog, the quiet the device lives in */
    --card: #FFFFFF;
    --ink: #10151C;
    --ink-soft: #46515C;
    --line: #D6DCE3;
    --alarm: #D93036;     /* urgent: smoke alarm, glass */
    --door: #2456D6;      /* someone's here: doorbell, knock */
    --appliance: #DB8B00; /* attention: kettle, microwave, dryer */
    --taught: #178A50;    /* learned: custom sounds */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--silence);
    color: var(--ink);
    font-family: 'Atkinson Hyperlegible', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  :focus-visible { outline: 3px solid var(--door); outline-offset: 3px; }

  /* ---------- header ---------- */

  header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    max-width: 1180px; margin: 0 auto;
    padding: 26px 24px 18px;
  }

  header h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.01em;
  }

  header .sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: .15em; text-transform: uppercase;
    color: var(--ink-soft);
    padding-top: 3px;
  }

  .grow { flex: 1; }

  #host {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    width: 170px;
  }

  .status {
    display: flex; align-items: center; gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-soft);
  }

  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--ink-soft); flex: none; }
  .dot.on {
    background: var(--taught);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .dot.off { background: var(--alarm); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(23, 138, 80, .4); }
    50%      { box-shadow: 0 0 0 6px rgba(23, 138, 80, 0); }
  }

  @media (prefers-reduced-motion: reduce) { .dot.on { animation: none; } }

  /* ---------- layout ---------- */

  main {
    display: grid; grid-template-columns: 1fr 350px; gap: 16px;
    max-width: 1180px; margin: 0 auto;
    padding: 0 24px 56px;
  }

  @media (max-width: 880px) { main { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(16, 21, 28, .05);
  }

  .card h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: .16em; text-transform: uppercase;
    color: var(--ink-soft);
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--line);
  }

  .card .body { padding: 16px 18px; }

  /* ---------- detection log ---------- */

  #feed { list-style: none; max-height: 72vh; overflow: auto; padding: 2px 18px 6px; }

  #feed li {
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    padding: 13px 0;
    border-top: 1px dashed var(--line);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  #feed li:first-child { border-top: none; }

  .chip {
    order: -1;
    display: flex; align-items: center; gap: 8px; align-self: center;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    min-width: 96px;
  }

  .chip::before {
    content: ""; width: 12px; height: 12px; border-radius: 3px; flex: none;
  }

  .chip.urgent    { color: var(--alarm); }     .chip.urgent::before    { background: var(--alarm); }
  .chip.presence  { color: var(--door); }      .chip.presence::before  { background: var(--door); }
  .chip.appliance { color: var(--appliance); } .chip.appliance::before { background: var(--appliance); }
  .chip.taught    { color: var(--taught); }    .chip.taught::before    { background: var(--taught); }

  .time { color: var(--ink-soft); }
  .label { font-weight: 600; letter-spacing: .03em; text-transform: uppercase; }
  .conf { margin-left: auto; color: var(--ink-soft); }
  .src { color: var(--ink-soft); }

  .empty {
    border-top: none !important;
    color: var(--ink-soft);
    padding: 26px 0 !important;
    font-family: 'Atkinson Hyperlegible', system-ui, sans-serif !important;
  }

  .empty code { font-family: 'IBM Plex Mono', monospace; color: var(--ink); font-size: 13px; }

  /* ---------- teach ---------- */

  label.fld {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  input[type=text] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 8px;
    padding: 9px 11px;
    font-size: 15px;
    font-family: inherit;
  }

  .marks { display: flex; gap: 8px; margin: 14px 0; }

  .marks i {
    width: 12px; height: 12px; border-radius: 3px;
    background: var(--silence);
    border: 1px solid var(--line);
  }

  .marks i.done { background: var(--taught); border-color: var(--taught); }

  .btn {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    background: var(--card);
    color: var(--ink);
  }

  .btn.rec:hover:not(:disabled) { border-color: var(--ink-soft); }

  .btn.primary {
    background: var(--ink);
    border-color: var(--ink);
    color: #E8EDF2;
  }

  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn + .btn { margin-top: 10px; }

  .note {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 10px;
    min-height: 18px;
  }

  .note.ok { color: var(--taught); }
  .note.err { color: var(--alarm); }

  /* ---------- rules ---------- */

  #rules { list-style: none; }

  #rules li {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
    border-top: 1px dashed var(--line);
  }

  #rules li:first-child { border-top: none; }

  #rules .rl { flex: 1; font-weight: 700; font-size: 14px; text-transform: capitalize; }

  select {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 12px;
  }

  .sw { position: relative; width: 36px; height: 20px; flex: none; }
  .sw input { opacity: 0; width: 0; height: 0; }
  .sw span {
    position: absolute; inset: 0;
    background: var(--line);
    border-radius: 999px;
    transition: .15s;
    cursor: pointer;
  }
  .sw span:before {
    content: "";
    position: absolute; width: 14px; height: 14px; left: 3px; top: 3px;
    background: var(--card);
    border-radius: 50%;
    transition: .15s;
  }
  .sw input:checked + span { background: var(--taught); }
  .sw input:checked + span:before { transform: translateX(16px); }

  @media (prefers-reduced-motion: reduce) {
    .sw span, .sw span:before { transition: none; }
  }
</style>
</head>
<body>
<header>
  <h1>EARSHOT</h1><span class="sub">Dashboard</span>
  <div class="grow"></div>
  <input id="host" title="Pi host:port" placeholder="pi-ip:8000">
  <span class="status"><span id="dot" class="dot" aria-hidden="true"></span><span id="stat">connecting</span></span>
</header>

<main>
  <section class="card" aria-label="Live detection log">
    <h2>Detection log</h2>
    <ul id="feed"><li class="empty" id="empty">Waiting for events. Fire one with the backend's <code>/debug/event</code>.</li></ul>
  </section>

  <div>
    <section class="card" style="margin-bottom:16px">
      <h2>Teach a sound</h2>
      <div class="body">
        <label class="fld" for="tname">Name</label>
        <input type="text" id="tname" placeholder="e.g. kettle">
        <div class="marks" aria-hidden="true"><i id="d0"></i><i id="d1"></i><i id="d2"></i></div>
        <button class="btn rec" id="rec">Record clip 1 of 3</button>
        <button class="btn primary" id="teach" disabled>Teach sound</button>
        <div class="note" id="tnote" role="status"></div>
      </div>
    </section>

    <section class="card">
      <h2>Rules</h2>
      <div class="body"><ul id="rules"></ul></div>
    </section>
  </div>
</main>

<script src="js/shared.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
