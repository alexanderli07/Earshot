<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0e1116">
<title>Earshot Wearable</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --line:#262d38; --text:#e6e9ee; --muted:#8a94a3;
    --urgent:#d92d20; --presence:#2e6fe8; --appliance:#d97706; --taught:#12805c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--text);overflow:hidden;user-select:none;
    font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .hidden{display:none}

  /* arm */
  #arm h1{font-size:28px;letter-spacing:.12em;margin:0 0 8px}
  #arm p{color:var(--muted);max-width:280px;margin:0 0 24px;font-size:14px}
  #armhost{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:6px;
    padding:10px 12px;font-size:14px;width:220px;margin-bottom:16px;text-align:center}
  #armBtn{border:0;border-radius:8px;padding:18px 56px;font-size:18px;font-weight:700;letter-spacing:.08em;
    background:var(--taught);color:#fff;cursor:pointer}

  /* idle */
  #idle .pulse{width:14px;height:14px;border-radius:50%;background:var(--taught);margin-bottom:16px;
    animation:breathe 2.4s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.1)}}
  #idle .who{font-size:18px;color:var(--muted)}
  #idle .conn{position:fixed;bottom:16px;font-size:12px;color:var(--muted)}
  #idle .conn.off{color:var(--urgent)}

  /* alert */
  #alert .lbl{font-size:14vw;font-weight:800;line-height:1.05;letter-spacing:-.01em;text-transform:uppercase;
    color:#fff;padding:0 12px;word-break:break-word}
  #alert .cat{margin-top:16px;font-size:4.5vw;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
    color:rgba(255,255,255,.8)}
  #alert.flash{animation:flash .5s steps(2) 3}
  @keyframes flash{50%{filter:brightness(1.6)}}
</style>
</head>
<body>

<!-- arm: mobile browsers require a user tap before vibration + wake lock -->
<div class="screen" id="arm">
  <h1>EARSHOT</h1>
  <p>Tap arm to start. This enables vibration and keeps the screen awake.</p>
  <input id="armhost" placeholder="pi-ip:8000">
  <button id="armBtn">ARM</button>
</div>

<div class="screen hidden" id="idle">
  <div class="pulse"></div>
  <div class="who">Listening</div>
  <div class="conn" id="conn">connecting</div>
</div>

<div class="screen hidden" id="alert">
  <div class="lbl" id="alertLabel"></div>
  <div class="cat" id="alertCat"></div>
</div>

<script src="js/shared.js"></script>
<script src="js/wearable.js"></script>
</body>
</html>
