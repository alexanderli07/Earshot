<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#10151C">
<title>Earshot · Wearable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* The wearable is the pitch page's one dark block: ink, mono labels,
   * palette colors doing the talking. */
  :root {
    --ink: #10151C;
    --paper: #E8EDF2;
    --soft: #9AA7B3;
    --line: #313B46;
    --alarm: #D93036;
    --door: #2456D6;
    --appliance: #DB8B00;
    --taught: #178A50;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    background: var(--ink);
    color: var(--paper);
    overflow: hidden;
    user-select: none;
    font-family: 'Atkinson Hyperlegible', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    display: flex; align-items: center; justify-content: center; text-align: center;
    -webkit-font-smoothing: antialiased;
  }

  :focus-visible { outline: 3px solid var(--door); outline-offset: 3px; }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
  }

  .hidden { display: none; }

  .eyebrow {
    display: flex; align-items: center; gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 500;
    letter-spacing: .15em; text-transform: uppercase;
    color: var(--soft);
  }

  /* ---------- arm ---------- */

  #arm h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 34px;
    letter-spacing: -0.01em;
    margin: 14px 0 8px;
  }

  #arm p {
    color: var(--soft);
    max-width: 300px;
    margin: 0 0 26px;
    font-size: 15px;
  }

  #armhost {
    font-family: 'IBM Plex Mono', monospace;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--paper);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    width: 230px;
    margin-bottom: 18px;
    text-align: center;
  }

  #armBtn {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    border: 0;
    border-radius: 10px;
    padding: 18px 58px;
    font-size: 19px;
    letter-spacing: .06em;
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
  }

  /* ---------- idle ---------- */

  #idle .led {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--taught);
    margin-bottom: 18px;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(23, 138, 80, .45); }
    50%      { box-shadow: 0 0 0 8px rgba(23, 138, 80, 0); }
  }

  #idle .who {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--soft);
  }

  #idle .conn {
    position: fixed; bottom: 18px; left: 0; right: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--soft);
  }

  #idle .conn.off { color: var(--alarm); }

  /* ---------- alert ---------- */

  #alert .lbl {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 15vw;
    line-height: 1.02;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: #FFFFFF;
    padding: 0 12px;
    word-break: break-word;
  }

  #alert .cat {
    margin-top: 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 4.2vw;
    letter-spacing: .22em; text-transform: uppercase;
    color: rgba(255, 255, 255, .85);
  }

  #alert.flash { animation: flash .5s steps(2) 3; }

  @keyframes flash { 50% { filter: brightness(1.6); } }

  @media (prefers-reduced-motion: reduce) {
    #idle .led { animation: none; }
    #alert.flash { animation: none; }
  }
</style>
</head>
<body>

<!-- arm: mobile browsers require a user tap before vibration + wake lock -->
<div class="screen" id="arm">
  <p class="eyebrow">Earshot · Wearable</p>
  <h1>The wrist unit</h1>
  <p>Tap arm to start. This enables vibration and keeps the screen awake.</p>
  <input id="armhost" placeholder="pi-ip:8000">
  <button id="armBtn">ARM</button>
</div>

<div class="screen hidden" id="idle">
  <div class="led" aria-hidden="true"></div>
  <div class="who">Listening</div>
  <div class="conn" id="conn">connecting</div>
</div>

<div class="screen hidden" id="alert">
  <div class="lbl" id="alertLabel"></div>
  <div class="cat" id="alertCat"></div>
</div>

<script src="js/shared.js"></script>
<script src="js/wearable.js"></script>
</body>
</html>
